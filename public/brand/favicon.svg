<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Festag">
  <style>
    .mark-light { display: block; }
    .mark-dark { display: none; }
    @media (prefers-color-scheme: dark) {
      .mark-light { display: none; }
      .mark-dark { display: block; }
    }
  </style>
  <image class="mark-light" href="data:image/png;base64," x="0" y="0" width="64" height="64" preserveAspectRatio="xMidYMid meet"/>
  <image class="mark-dark" href="data:image/png;base64," x="0" y="0" width="64" height="64" preserveAspectRatio="xMidYMid meet"/>
</svg>
