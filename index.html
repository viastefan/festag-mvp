<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Festag MVP</title>

<style>
body{
  background:#F5F7FA;
  font-family: 'DM Sans', sans-serif;
  margin:0;
  color:#111;
}

/* LOGIN */
#auth{
  max-width:420px;
  margin:80px auto;
  background:white;
  padding:20px;
  border-radius:12px;
  border:1px solid #E6E8EE;
}

#auth input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

#auth button{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#2F6BFF;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

#dashboard{
  display:none;
}
</style>
</head>

<body>

<!-- =========================
     🔐 AUTH
========================= -->
<div id="auth">
  <h2>Festag Login</h2>

  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Login</button>

  <p id="status"></p>
</div>

<!-- =========================
     🚀 DASHBOARD
========================= -->
<div id="dashboard">
  <h1>Dashboard läuft 🚀</h1>
</div>

<!-- =========================
     🔥 SUPABASE + LOGIC
========================= -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
console.log("APP LOADED 🚀");

// ======================
// SUPABASE INIT
// ======================
const supabaseUrl = "https://DEIN-PROJECT.supabase.co";
const supabaseKey = "sb_publishable_MGTVjX_dT_rlhvdzTgqw7g_LBUg9W_z";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// ======================
// UI
// ======================
function showDashboard(){
  document.getElementById("auth").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

function showAuth(){
  document.getElementById("auth").style.display = "block";
  document.getElementById("dashboard").style.display = "none";
}

// ======================
// SIGN UP
// ======================
async function signUp(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  document.getElementById("status").innerText =
    error ? error.message : "Check Email zur Bestätigung!";
}

// ======================
// SIGN IN
// ======================
async function signIn(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    document.getElementById("status").innerText = error.message;
    return;
  }

  showDashboard();
}

// ======================
// LOGOUT
// ======================
async function logout(){
  await supabase.auth.signOut();
  showAuth();
}

// ======================
// AUTO LOGIN CHECK
// ======================
async function checkUser(){
  const { data } = await supabase.auth.getSession();

  if(data && data.session){
    showDashboard();
  } else {
    showAuth();
  }
}

checkUser();
</script>

</body>
</html>
