<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Festag MVP</title>

<style>
body{
  background:#F5F7FA;
  font-family: 'DM Sans', sans-serif;
  margin:0;
  color:#111;
}

/* LOGIN */
#auth{
  max-width:420px;
  margin:80px auto;
  background:white;
  padding:20px;
  border-radius:12px;
  border:1px solid #E6E8EE;
}

#auth input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

#auth button{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#2F6BFF;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

#dashboard{
  display:none;
}
</style>
</head>

<body>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
console.log("APP LOADED 🚀");

// ======================
// SUPABASE (NUR 1x!)
// ======================
const supabaseUrl = "https://DEIN-PROJECT.supabase.co";
const supabaseKey = "sb_publishable_MGTVjX_dT_rlhvdzTgqw7g_LBUg9W_z";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ======================
// AUTH FUNCTIONS (GLOBAL)
// ======================
window.signUp = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signUp({
    email,
    password
  });

  document.getElementById("status").innerText =
    error ? error.message : "Check Email zur Bestätigung!";
};

window.signIn = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("status").innerText = error.message;
    return;
  }

  showDashboard();
};

window.logout = async function () {
  await client.auth.signOut();
  document.getElementById("auth").style.display = "block";
  document.getElementById("dashboard").style.display = "none";
};

function showDashboard() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

// ======================
// AUTO LOGIN CHECK
// ======================
client.auth.getSession().then(({ data }) => {
  if (data.session) {
    showDashboard();
  }
});
</script>


</body>
</html>
