<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<style>
  :root { color-scheme: light dark; }
  body {
    width: 300px; margin: 0; padding: 14px;
    font: 13px/1.45 -apple-system, 'Aeonik', Inter, sans-serif;
    background: #fff; color: #111;
  }
  @media (prefers-color-scheme: dark) { body { background: #111214; color: #f4f4f4; } }
  h1 { margin: 0 0 4px; font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  h2 { margin: 16px 0 6px; font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #888; }
  p { margin: 0 0 12px; color: #777; font-size: 12px; }
  .row {
    display: flex; align-items: center; gap: 9px;
    width: 100%; padding: 9px 10px; margin-bottom: 4px;
    background: transparent; border: 0; border-radius: 10px;
    font: inherit; text-align: left; cursor: pointer; color: inherit;
  }
  .row:hover { background: rgba(125,125,125,.12); }
  .dot { width: 9px; height: 9px; border-radius: 999px; background: #5B647D; flex-shrink: 0; }
  .title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  .hint { font-size: 11px; color: #999; }
  .login {
    display: block; width: 100%; padding: 10px;
    background: #5B647D; color: #fff; border: 0; border-radius: 999px;
    font: inherit; font-weight: 500; cursor: pointer; text-align: center; text-decoration: none;
  }
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 12px; margin-bottom: 8px;
    background: rgba(125,125,125,.1); border-radius: 12px;
  }
  .toggle-copy strong { display: block; font-size: 13px; font-weight: 600; }
  .toggle-copy span { font-size: 11.5px; color: #888; }
  .toggle {
    position: relative; width: 44px; height: 26px; flex-shrink: 0;
    background: #ccc; border: 0; border-radius: 999px; cursor: pointer;
    transition: background .15s;
  }
  .toggle.on { background: #5B647D; }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 20px; height: 20px; border-radius: 50%;
    background: #fff; transition: transform .15s;
  }
  .toggle.on::after { transform: translateX(18px); }
  .writing-hint {
    margin: -4px 0 10px;
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(225, 29, 72, 0.1);
    color: #be123c;
    font-size: 11.5px;
    line-height: 1.35;
  }
  @media (prefers-color-scheme: dark) {
    .writing-hint { background: rgba(225, 29, 72, 0.16); color: #fda4af; }
  }
  #status { font-size: 12px; color: #999; }
  .divider { height: 1px; background: rgba(125,125,125,.2); margin: 14px 0; }
</style>
</head>
<body>
  <h1>Festag Tagro</h1>

  <div class="toggle-row">
    <div class="toggle-copy">
      <strong>Schreibhilfe überall</strong>
      <span>Tagro-Button in Textfeldern (Gmail, Formulare, …)</span>
    </div>
    <button type="button" id="writing-toggle" class="toggle on" aria-pressed="true" aria-label="Schreibhilfe überall"></button>
  </div>
  <p id="writing-hint" class="writing-hint" hidden>Schreibhilfe ist aus — Tagro erscheint nicht in Textfeldern.</p>

  <div class="divider"></div>

  <h2>Live-Feedback</h2>
  <p>Projekt wählen — das Panel öffnet sich auf dieser Seite.</p>
  <div id="status">Lade…</div>
  <div id="list"></div>
  <script src="popup.js"></script>
</body>
</html>
