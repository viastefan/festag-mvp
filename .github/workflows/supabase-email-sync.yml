name: Sync Supabase auth email templates

on:
  push:
    branches: [main]
    paths:
      - 'supabase/email-templates/**'
      - '.github/workflows/supabase-email-sync.yml'
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: xsdkoepwuvpuroijjain

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build PATCH payload from repo templates
        run: |
          jq -n \
            --rawfile ml supabase/email-templates/auth-magic-link.html \
            --rawfile cs supabase/email-templates/auth-confirm-signup.html \
            '{
              mailer_subjects_magic_link: "Dein Festag Login",
              mailer_templates_magic_link_content: $ml,
              mailer_subjects_confirmation: "Willkommen bei Festag",
              mailer_templates_confirmation_content: $cs
            }' > payload.json
          echo "payload size: $(wc -c < payload.json) bytes"
          jq 'keys' payload.json

      - name: PATCH Supabase auth config
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is missing. Add it under repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data @payload.json \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/config/auth")
          echo "HTTP $http_code"
          if [ "$http_code" != "200" ]; then
            echo "::error::Supabase API returned non-200"
            cat response.json
            exit 1
          fi
          jq '{magic: .mailer_subjects_magic_link, confirm: .mailer_subjects_confirmation}' response.json
