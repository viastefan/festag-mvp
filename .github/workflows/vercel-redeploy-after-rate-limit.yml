# One-shot style: re-triggers Vercel builds after Hobby rate-limit window (~24h).
# Remove or disable this workflow once festag.app is on festag-mvp and extra
# Vercel projects are disconnected from the repo.
name: Retry Vercel deploy

on:
  schedule:
    # 22 Jun 2026, 14:05 UTC (~16:05 Berlin) — after typical 24h Hobby reset
    - cron: '5 14 22 6 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Empty commit to retrigger Vercel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "$(cat <<'EOF'
chore: retrigger Vercel deploy after rate limit reset.

Scheduled retry so festag.app picks up pending main builds.
EOF
)"
          git push origin main
