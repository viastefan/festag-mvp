name: Apply documents database migration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/documents-prod-migration-full.sql'
      - 'scripts/apply-documents-prod.sh'
      - 'supabase/migrations/20260710_profile_invoice_bank.sql'
      - '.github/workflows/supabase-documents-migration.yml'

env:
  SUPABASE_PROJECT_REF: xsdkoepwuvpuroijjain

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply documents prod SQL (chunked)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is missing."
            exit 1
          fi

          run_query() {
            local label="$1"
            local sql="$2"
            echo "==> ${label}"
            local payload
            payload=$(python3 -c 'import json,sys; print(json.dumps({"query": sys.stdin.read()}))' <<< "${sql}")
            local code
            code=$(curl -sS -o /tmp/supabase-resp.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "${payload}" \
              "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query")
            echo "HTTP ${code}"
            cat /tmp/supabase-resp.json
            echo
            if [ "${code}" != "200" ] && [ "${code}" != "201" ]; then
              echo "::error::Query failed: ${label}"
              exit 1
            fi
          }

          run_query "profiles billing columns" \
            "alter table public.profiles add column if not exists company_name text, add column if not exists company_address text, add column if not exists company_city text, add column if not exists company_zip text, add column if not exists company_country text default 'Deutschland', add column if not exists vat_number text, add column if not exists tax_number text, add column if not exists phone text, add column if not exists invoice_iban text, add column if not exists invoice_bic text;"

          run_query "workspace_branding invoice columns" \
            "alter table public.workspace_branding add column if not exists invoice_company_name text, add column if not exists invoice_company_address text, add column if not exists invoice_iban text, add column if not exists invoice_bic text, add column if not exists invoice_vat_id text, add column if not exists invoice_footer text;"

          run_query "agency document counters + RPC" \
            "create table if not exists public.agency_document_counters (workspace_id uuid not null references public.workspaces(id) on delete cascade, kind text not null, value int not null default 0, primary key (workspace_id, kind)); create or replace function public.next_agency_doc_number(p_workspace uuid, p_kind text) returns int language plpgsql security definer set search_path = public as \$\$ declare v int; begin insert into public.agency_document_counters(workspace_id, kind, value) values (p_workspace, p_kind, 1) on conflict (workspace_id, kind) do update set value = public.agency_document_counters.value + 1 returning value into v; return v; end \$\$;"

          run_query "agency documents dev policy" \
            "drop policy if exists agency_documents_dev_project on public.agency_documents; create policy agency_documents_dev_project on public.agency_documents for all using (project_id is not null and exists (select 1 from public.projects p where p.id = agency_documents.project_id and (p.assigned_dev = auth.uid() or exists (select 1 from public.project_assignments pa where pa.project_id = p.id and pa.user_id = auth.uid() and pa.active = true)))) with check (project_id is not null and exists (select 1 from public.projects p where p.id = agency_documents.project_id and (p.assigned_dev = auth.uid() or exists (select 1 from public.project_assignments pa where pa.project_id = p.id and pa.user_id = auth.uid() and pa.active = true))));"

          run_query "agency documents client read policy" \
            "drop policy if exists agency_documents_client_read on public.agency_documents; create policy agency_documents_client_read on public.agency_documents for select using (status in ('sent', 'paid') and project_id is not null and exists (select 1 from public.projects p where p.id = agency_documents.project_id and p.user_id = auth.uid()));"

      - name: Verify issuer columns exist
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          query='{"query":"select column_name from information_schema.columns where table_schema = '\''public'\'' and table_name = '\''profiles'\'' and column_name in ('\''invoice_iban'\'','\''invoice_bic'\'') order by 1;"}'
          code=$(curl -sS -o verify.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "${query}" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query/read-only")
          echo "Verify HTTP ${code}"
          cat verify.json
          echo
          test "${code}" = "200"
