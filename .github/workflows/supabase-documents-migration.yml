name: Apply documents database migration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/documents-prod-migration-full.sql'
      - 'supabase/migrations/20260710_profile_invoice_bank.sql'
      - '.github/workflows/supabase-documents-migration.yml'

env:
  SUPABASE_PROJECT_REF: xsdkoepwuvpuroijjain

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply documents prod SQL
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is missing."
            exit 1
          fi
          query=$(python3 -c 'import json, pathlib; print(json.dumps({"query": pathlib.Path("scripts/documents-prod-migration-full.sql").read_text()}))')
          http_code=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$query" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query")
          echo "HTTP $http_code"
          cat response.json
          if [ "$http_code" != "200" ] && [ "$http_code" != "201" ]; then
            exit 1
          fi

      - name: Verify issuer columns exist
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          query='{"query":"select column_name from information_schema.columns where table_schema = '\''public'\'' and table_name = '\''profiles'\'' and column_name in ('\''invoice_iban'\'','\''invoice_bic'\'') order by 1;"}'
          http_code=$(curl -sS -o verify.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$query" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query/read-only")
          echo "HTTP $http_code"
          cat verify.json
          test "$http_code" = "200"
