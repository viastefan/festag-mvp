<!--
Supabase Auth > Email Templates > Confirm signup
Subject suggestion: Dein Bestätigungscode

OpenAI-minimal Festag OTP: wordmark, heading, one calm line, large bare code,
secondary text link (no pill), sign-off, quiet help/legal footer.
Synced to production via .github/workflows/supabase-email-sync.yml on push to main.
Keep visually identical to tplAuthOtp in lib/email/templates.ts (IONOS path).
-->
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light only">
  <meta name="supported-color-schemes" content="light">
  <!--[if mso]>
  <style type="text/css">
    body, table, td, a, p, div { font-family: Arial, Helvetica, sans-serif !important; }
  </style>
  <![endif]-->
  <style>
    @font-face {
      font-family: 'Aeonik';
      src: url('https://festag.app/fonts/Aeonik-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      mso-font-alt: 'Helvetica Neue';
    }
    @media screen and (max-width: 620px) {
      .page { padding: 48px 24px !important; }
      .code { font-size: 28px !important; letter-spacing: 0.28em !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background:#ffffff;color:#1e1e20;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">
    Code: {{ .Token }}
  </div>

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#ffffff;border-collapse:collapse;mso-table-lspace:0;mso-table-rspace:0;">
    <tr>
      <td class="page" align="left" style="padding:72px 40px;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:400;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:440px;width:100%;border-collapse:collapse;">
          <tr>
            <td style="padding:0 0 56px;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:400;letter-spacing:-0.02em;line-height:1;color:#1e1e20;">
              festag
            </td>
          </tr>
          <tr>
            <td style="padding:0 0 16px;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:28px;font-weight:400;letter-spacing:-0.03em;line-height:1.2;color:#1e1e20;">
              Dein Bestätigungscode
            </td>
          </tr>
          <tr>
            <td style="padding:0 0 36px;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:400;line-height:1.55;color:#6b6b70;">
              Nutze diesen Code, um deine E-Mail-Adresse bei Festag zu bestätigen.
            </td>
          </tr>
          <tr>
            <td class="code" style="padding:0 0 40px;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:36px;font-weight:400;letter-spacing:0.36em;line-height:1.15;color:#1e1e20;">
              {{ .Token }}
            </td>
          </tr>
          <tr>
            <td style="padding:0 0 48px;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;font-weight:400;line-height:1.55;">
              <a href="{{ .RedirectTo }}&token_hash={{ .TokenHash }}&type=signup"
                 style="color:#6b6b70;text-decoration:underline;text-underline-offset:3px;">
                Anmeldung öffnen
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 0 4px;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:400;line-height:1.55;color:#1e1e20;">
              Viele Grüße,
            </td>
          </tr>
          <tr>
            <td style="padding:0 0 48px;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:400;line-height:1.55;color:#1e1e20;">
              Festag
            </td>
          </tr>
          <tr>
            <td style="padding:0 0 8px;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;font-weight:400;line-height:1.55;color:#6b6b70;">
              Der Code ist 60 Minuten gültig. Hast du keinen Account erstellt, ignoriere diese E-Mail.
            </td>
          </tr>
          <tr>
            <td style="padding:32px 0 0;font-family:'Aeonik','Helvetica Neue',Helvetica,Arial,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;font-weight:400;line-height:1.6;color:#8e8e93;">
              <a href="mailto:hello@festag.app" style="color:#8e8e93;text-decoration:underline;text-underline-offset:2px;">Hilfe</a>
              <span style="padding:0 8px;color:#ececee;">|</span>
              <a href="https://festag.app/impressum" style="color:#8e8e93;text-decoration:underline;text-underline-offset:2px;">Impressum</a>
              <span style="padding:0 8px;color:#ececee;">|</span>
              <a href="https://festag.app/datenschutz" style="color:#8e8e93;text-decoration:underline;text-underline-offset:2px;">Datenschutz</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
